name: Notify Predictions

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call notify endpoint
        run: |
          STATUS=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/notify")
          cat /tmp/out.json
          [ "$STATUS" = "200" ] || { echo "HTTP $STATUS"; exit 1; }
